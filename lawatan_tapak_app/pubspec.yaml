name: lawatan_tapak_app
description: Aplikasi laporan lawatan tapak untuk iOS, Android, dan Windows.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  exif: ^3.3.0
  geolocator: ^13.0.2
  google_maps_flutter: ^2.9.0
  image_picker: ^1.1.2
  path: ^1.9.0
  path_provider: ^2.1.5
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
